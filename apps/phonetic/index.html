<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonetic Alphabet Quiz</title>
    <style>
        :root {
            --primary: #3465a4;
            --primary-hover: #729fcf;
            --bg: #eeeeec;
            --card-bg: #ffffff;
            --text: #2e3436;
            --success: #4e9a06;
            --error: #cc0000;
            --disabled: #babdb6;
        }

        body {
            font-family: system-ui, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.8rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .language-selector {
            margin-bottom: 1.5rem;
        }

        .language-selector label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .language-selector select {
            width: 50%;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .language-selector select:focus {
            border-color: var(--primary);
        }

        .letter-box {
            padding: 2rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .letter-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary);
            line-height: 1;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--disabled);
            cursor: not-allowed;
        }

        .feedback {
            height: 24px;
            margin-top: 1rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feedback.visible {
            opacity: 1;
        }

        .feedback.correct { color: var(--success); }
        .feedback.incorrect { color: var(--error); }

        .hidden { display: none; }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1>Phonetic Alphabet Quiz</h1>
            <p>Test your knowledge of phonetic alphabets from around the world.</p>
            <div class="language-selector">
                <label for="language-select">Select Language:</label>
                <select id="language-select">
                    <option value="nato">NATO (English)</option>
                    <option value="swedish">Svenska</option>
                    <option value="fake">Fake (for testing)</option>
                </select>
            </div>
            <button onclick="startGame()">Start quiz</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="stats">
                <span id="score-display">Score: -</span>
                <span id="current-language-display">-</span>
                <span id="progress-display">-/-</span>
            </div>

            <div class="letter-box">
                <div class="letter-display" id="current-display">A</div>
            </div>

            <div class="input-group">
                <input type="text" id="answer-input" placeholder="Type answer here..." autocomplete="off">
            </div>

            <button id="submit-button" onclick="checkAnswer()">Check</button>

            <div id="feedback-display" class="feedback"></div>
        </div>

        <div id="end-screen" class="hidden">
            <h1>Quiz Complete!</h1>
            <p>Your final score is:</p>
            <div class="result-score" id="final-score">-/-</div>
            <p id="final-message"></p>
            <button onclick="startGame()">Again!</button>
            <button onclick="resetGame()">Reset</button>
        </div>
    </div>

    <script>
        const phoneticAlphabets = {
            nato: [
                { letter: 'A', word: 'Alpha' },
                { letter: 'B', word: 'Bravo' },
                { letter: 'C', word: 'Charlie' },
                { letter: 'D', word: 'Delta' },
                { letter: 'E', word: 'Echo' },
                { letter: 'F', word: 'Foxtrot' },
                { letter: 'G', word: 'Golf' },
                { letter: 'H', word: 'Hotel' },
                { letter: 'I', word: 'India' },
                { letter: 'J', word: 'Juliett' },
                { letter: 'K', word: 'Kilo' },
                { letter: 'L', word: 'Lima' },
                { letter: 'M', word: 'Mike' },
                { letter: 'N', word: 'November' },
                { letter: 'O', word: 'Oscar' },
                { letter: 'P', word: 'Papa' },
                { letter: 'Q', word: 'Quebec' },
                { letter: 'R', word: 'Romeo' },
                { letter: 'S', word: 'Sierra' },
                { letter: 'T', word: 'Tango' },
                { letter: 'U', word: 'Uniform' },
                { letter: 'V', word: 'Victor' },
                { letter: 'W', word: 'Whiskey' },
                { letter: 'X', word: 'X-ray' },
                { letter: 'Y', word: 'Yankee' },
                { letter: 'Z', word: 'Zulu' }
            ],
            swedish: [
                { letter: 'A', word: 'Adam' },
                { letter: 'B', word: 'Bertil' },
                { letter: 'C', word: 'Cesar' },
                { letter: 'D', word: 'David' },
                { letter: 'E', word: 'Erik' },
                { letter: 'F', word: 'Filip' },
                { letter: 'G', word: 'Gustav' },
                { letter: 'H', word: 'Helge' },
                { letter: 'I', word: 'Ivar' },
                { letter: 'J', word: 'Johan' },
                { letter: 'K', word: 'Kalle' },
                { letter: 'L', word: 'Ludvig' },
                { letter: 'M', word: 'Martin' },
                { letter: 'N', word: 'Niklas' },
                { letter: 'O', word: 'Olof' },
                { letter: 'P', word: 'Petter' },
                { letter: 'Q', word: 'Qvintus' },
                { letter: 'R', word: 'Rudolf' },
                { letter: 'S', word: 'Sigurd' },
                { letter: 'T', word: 'Tore' },
                { letter: 'U', word: 'Urban' },
                { letter: 'V', word: 'Viktor' },
                { letter: 'W', word: 'Wilhelm' },
                { letter: 'X', word: 'Xerxes' },
                { letter: 'Y', word: 'Yngve' },
                { letter: 'Z', word: 'Zäta' },
                { letter: 'Å', word: 'Åke' },
                { letter: 'Ä', word: 'Ärlig' },
                { letter: 'Ö', word: 'Östen' },
            ],
            fake: [
                { letter: 'A', word: 'A' },
                { letter: 'B', word: 'B' },
                { letter: 'C', word: 'C' },
            ]
        };

        const languageNames = {
            nato: 'NATO (English)',
            swedish: 'Svenska',
            fake: 'Fake (for testing)'
        };

        let currentAlphabet = [];
        let currentIndex = 0;
        let score = 0;
        let isProcessing = false;

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const letterDisplay = document.getElementById('current-display');
        const inputField = document.getElementById('answer-input');
        const scoreDisplay = document.getElementById('score-display');
        const progressDisplay = document.getElementById('progress-display');
        const feedbackDisplay = document.getElementById('feedback-display');
        const submitButton = document.getElementById('submit-button');
        const languageSelect = document.getElementById('language-select');
        const currentLanguageDisplay = document.getElementById('current-language-display');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function calcPercentage(x, y, fixed = 2) {
            const percent = (x / y) * 100;
            if(!isNaN(percent)) {
                return Number(percent.toFixed(fixed));
            } else {
                return null;
            }
        }

        function showStartScreen() {
            endScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        function startGame() {
            selectedLanguage = languageSelect.value;

            score = 0;
            currentIndex = 0;
            currentAlphabet = shuffleArray([...phoneticAlphabets[selectedLanguage]]);

            currentLanguageDisplay.textContent = languageNames[selectedLanguage];

            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');

            loadAlphabet();
        }

        function loadAlphabet() {
            if (currentIndex >= currentAlphabet.length) {
                endGame();
                return;
            }

            letterDisplay.textContent = currentAlphabet[currentIndex].letter;
            inputField.value = '';
            inputField.disabled = false;
            inputField.focus();
            submitButton.disabled = false;

            feedbackDisplay.className = 'feedback';
            feedbackDisplay.textContent = '';

            scoreDisplay.textContent = `Score: ${score}`;
            progressDisplay.textContent = `${currentIndex + 1} of ${currentAlphabet.length}`;
        }

        function checkAnswer() {
            if (isProcessing) return;

            const userAnswer = inputField.value.trim().toLowerCase();
            const correctWord = currentAlphabet[currentIndex].word.toLowerCase();

            if (!userAnswer) return;

            isProcessing = true;
            inputField.disabled = true;
            submitButton.disabled = true;

            const normalize = (str) => str
                .toLowerCase()
                .replace(/-/g, '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, ''); // Remove diacritics

            const normalizedUser = normalize(userAnswer);
            const normalizedCorrect = normalize(correctWord);

            if (normalizedUser === normalizedCorrect) {
                score++;
                showFeedback(true, `Correct! It is ${currentAlphabet[currentIndex].word}`);
            } else {
                showFeedback(false, `Incorrect. The answer was ${currentAlphabet[currentIndex].word}`);
            }

            scoreDisplay.textContent = `Score: ${score}`;

            setTimeout(() => {
                currentIndex++;
                isProcessing = false;
                loadAlphabet();
            }, 1500);
        }

        function showFeedback(isCorrect, message) {
            feedbackDisplay.textContent = message;
            feedbackDisplay.className = `feedback visible ${isCorrect ? 'correct' : 'incorrect'}`;
        }

        function endGame() {
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');

            const finalScore = document.getElementById('final-score');
            const finalMessage = document.getElementById('final-message');

            finalScore.textContent = `${score}/${currentAlphabet.length}`;

            const percentage = calcPercentage(score, currentAlphabet.length, 0);
            if (percentage === 100) {
                finalMessage.textContent = "Perfect! You are a master of the alphabet.";
            } else if (percentage >= 80) {
                finalMessage.textContent = "Great job! You know your phonetics well.";
            } else if (percentage >= 50) {
                finalMessage.textContent = "Not bad, but there's room for improvement.";
            } else {
                finalMessage.textContent = "Keep practicing! The phonetic alphabet is tricky.";
            }
        }

        function resetGame() {
            gameScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkAnswer();
            }
        });
    </script>
</body>
</html>
